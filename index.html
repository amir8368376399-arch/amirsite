<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرجع دانلود #ریسورس_پک #شیدر_پک بدراک</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0b0f1c;
            color: #e0e7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            margin: 0;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #1a2333;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
        }
        .page-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fbbf24;
            margin-bottom: 2rem;
            word-break: break-word;
            line-height: 1.3;
        }
        .card {
            background: #0f172a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .card h2 {
            color: #fbbf24;
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        .card p {
            color: #cbd5e1;
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            background: #fbbf24;
            color: #0b0f1c;
            font-weight: bold;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .btn:hover {
            background: #fcd34d;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-title">
            📥 مرجع دانلود #ریسورس_پک #شیدر_پک بدراک
        </div>

        <div class="card">
            <h2>✨ شیدر خفن Dexten shader</h2>
            <p>بهترین شیدر برای تجربه‌ای فوق‌العاده در ماینکرافت</p>
            <a href="https://drive.usercontent.google.com/download?id=1rpNoigmagD4OC46hVqG3uOb1Ip-GlXuW&export=download&authuser=0" class="btn">📥 دانلود</a>
        </div>
    </div>
</body>
</html>
