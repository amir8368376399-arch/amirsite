<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود ماینکرافت ریمیک</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0b0f1c, #1a2333);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e0e7ff;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to left, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin: 1rem 0 2rem 0;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .subtitle a {
            color: #60a5fa;
            text-decoration: none;
        }
        .card {
            background: rgba(0,0,0,0.35);
            border-radius: 1.8rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .card h2 {
            color: #fbbf24;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .card p {
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 1.2rem;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            color: #0b0f1c;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛏️ ماینکرافت ریمیک</h1>
        <div class="subtitle">
            کانال تلگرام ما: 
            <a href="https://t.me/Remaked_minecraft" target="_blank">t.me/Remaked_minecraft</a>
        </div>

        <div class="card">
            <h2>🎮 Minecraft Editing</h2>
            <p>ماینکرافت ریمیک و ادیت شده نسخه ۱.۲۱.۵۱ – بدون نیاز به اکانت</p>
            <a href="#" class="btn">📥 دانلود</a>
        </div>

        <div class="card">
            <h2>🧊 MineSkin</h2>
            <p>ماینکرافت کلون شده با اسکین‌پک‌های جدید</p>
            <a href="#" class="btn">📥 دانلود</a>
        </div>

        <div class="footer">
            لینک‌های دانلود به‌زودی فعال می‌شوند
        </div>
    </div>
</body>
</html>
